server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:fruit_management}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

fruit:
  wechat:
    appid: ${WECHAT_APPID:}
    secret: ${WECHAT_SECRET:}
    code2-session-url: ${WECHAT_CODE2_SESSION_URL:https://api.weixin.qq.com/sns/jscode2session}
  auth:
    session-ttl-minutes: ${FRUIT_SESSION_TTL_MINUTES:10080}
  demo-data:
    enabled: ${FRUIT_DEMO_DATA_ENABLED:false}

storage:
  provider: ${STORAGE_PROVIDER:cos}
  bucket: ${STORAGE_BUCKET:}
  region: ${STORAGE_REGION:}
