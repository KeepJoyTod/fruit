server:
  port: 8080

spring:
  application:
    name: fruit-management-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:fruit_management}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

fruit:
  wechat:
    appid: ${WECHAT_APPID:}
    secret: ${WECHAT_SECRET:}
    code2-session-url: ${WECHAT_CODE2_SESSION_URL:https://api.weixin.qq.com/sns/jscode2session}
  auth:
    session-ttl-minutes: ${FRUIT_SESSION_TTL_MINUTES:10080}
  demo-data:
    enabled: ${FRUIT_DEMO_DATA_ENABLED:true}
