services:
  mysql:
    image: mysql:8.0
    container_name: fruit-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: fruit_management
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - ./docs/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - fruit_mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4
    container_name: fruit-redis
    ports:
      - "6379:6379"

volumes:
  fruit_mysql_data:
